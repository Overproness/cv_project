# Aura-3D default configuration
model:
  encoder:
    backbone: dinov2_vitb14 # dinov2_vits14 | dinov2_vitb14 | resnet50
    pretrained: true
    out_dim: 768
    num_ref_views: 4 # supports 1..4 reference images
    cross_view_attn_layers: 2
    freeze_backbone: false

  flame:
    flame_model_path: /mnt/d/GitHub/cv_project/Aura3D/third_party/flame_pytorch/data/FLAME2020/generic_model.pkl
    n_shape: 100
    n_exp: 50
    n_pose: 6 # global rot + jaw
    use_face_contour: false

  decoder:
    # Predicts per-FLAME-vertex (or per-triangle) Gaussian parameter offsets
    type: uv_decoder # uv_decoder | mlp_decoder
    feature_dim: 128
    uv_resolution: 256
    n_gaussians_per_triangle: 1 # GaussianAvatars-style binding
    predict_attrs:
      - position_offset # delta xyz in triangle local frame
      - scale # log-space
      - rotation # quaternion
      - color # SH degree 0 (or RGB)
      - opacity

  eye_branch:
    enabled: true
    eyeball_radius: 0.012 # meters, FLAME canonical scale
    use_gerr: true # explicit rigid rotation + MLP residual
    residual_mlp_hidden: [128, 128]

  face_deform_mlp:
    hidden: [256, 256, 256]
    expr_cond_dim: 50
    pose_cond_dim: 6

  renderer:
    sh_degree: 1
    bg_color: [0.0, 0.0, 0.0]
    use_egnr: false # EGNR training-only; off at inference
    egnr_train_only: true

training:
  stage: 1 # 1 overfit | 2 cross-subject | 3 in-the-wild
  batch_size: 1
  num_ref_views: 4
  lr_encoder: 1.0e-5
  lr_decoder: 5.0e-4
  lr_deform: 1.0e-4
  lr_gaussian_attrs: 1.0e-3
  steps: 200000
  log_every: 50
  ckpt_every: 500
  max_grad_norm: 0.5
  losses:
    l1: 1.0
    ssim: 0.2
    lpips: 0.05 # Phase 2: perceptual sharpness; start conservative
    lpips_net: alex # alex uses ~4x less memory than vgg at inference/backward
    gaze: 0.1
    id: 0.05
    flame_reg: 1.0e-4
    scale_reg: 1.0e-2

data:
  dataset: nersemble
  root: /mnt/d/GitHub/cv_project/data/nersemble
  synthetic: false
  num_workers: 0
  image_size: 518 # must be a multiple of DINOv2 patch-size 14 (37×14=518)
  views_per_frame: 8
