model:
  encoder:
    backbone: dinov2_vitb14
    pretrained: true
    out_dim: 768
    num_ref_views: 4
    cross_view_attn_layers: 2
    freeze_backbone: false
  flame:
    flame_model_path: ./Aura3D/third_party/flame_pytorch/data/FLAME2020/generic_model.pkl
    n_shape: 100
    n_exp: 50
    n_pose: 6
    use_face_contour: false
  decoder:
    type: uv_decoder
    feature_dim: 128
    uv_resolution: 256
    n_gaussians_per_triangle: 1
    predict_attrs:
    - position_offset
    - scale
    - rotation
    - color
    - opacity
  eye_branch:
    enabled: true
    eyeball_radius: 0.012
    use_gerr: true
    residual_mlp_hidden:
    - 128
    - 128
  face_deform_mlp:
    hidden:
    - 256
    - 256
    - 256
    expr_cond_dim: 50
    pose_cond_dim: 6
  renderer:
    sh_degree: 1
    bg_color:
    - 0.0
    - 0.0
    - 0.0
    use_egnr: false
    egnr_train_only: true
training:
  stage: 1
  batch_size: 1
  num_ref_views: 4
  lr_encoder: 1.0e-05
  lr_decoder: 0.0005
  lr_deform: 0.0001
  lr_gaussian_attrs: 0.001
  steps: 200000
  log_every: 50
  ckpt_every: 500
  max_grad_norm: 0.5
  losses:
    l1: 1.0
    ssim: 0.2
    lpips: 0.05
    lpips_net: alex
    gaze: 0.1
    id: 0.05
    flame_reg: 0.0001
    scale_reg: 0.01
data:
  dataset: nersemble
  root: ./data/nersemble
  synthetic: false
  num_workers: 0
  image_size: 518
  views_per_frame: 8
